<!DOCTYPE html>
<html>
<head>
    <title>Eksperimen Font - Gilang</title>
</head>
<body>
    <h2>Modifikasi Teks dengan Tag Font</h2>

    <p>
        <font face="Verdana" color="#2c3e50">Teks ini pakai font Verdana biar kelihatan bersih.</font>
    </p>

    <p>
        <font size="6" color="#e74c3c"><b>PENGUMUMAN PENTING!</b></font><br>
        <font size="2" face="Courier New">Ditulis dengan font Courier New ukuran kecil.</font>
    </p>

    <p>
        Saya mencoba kombinasi warna biru tua: 
        <font color="#000080" face="Tahoma"><b>Ini hasil kombinasinya.</b></font>
    </p>
</body>
</html>
